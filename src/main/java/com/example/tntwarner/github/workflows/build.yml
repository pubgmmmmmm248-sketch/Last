name: Build Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 6.9
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build
      - name: Save Jar
        uses: actions/upload-artifact@v3
        with:
          name: TNT-Warner-Mod
          path: build/libs/*.jar
